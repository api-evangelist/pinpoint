principles:
- name: Visibility
  description: Track the Pinpoint subscription, contracted modules, and renewal dates against budget.
- name: Allocation
  description: Map the recruitment platform cost to the talent/HR cost center; tag API keys per integration.
- name: Optimization
  description: Right-size modules and seats at renewal; consolidate integrations to a single API key set.
- name: Accountability
  description: Assign an owner for the Pinpoint contract and review renewal terms annually with the vendor.
