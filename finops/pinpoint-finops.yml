description: >-
  FinOps view of Pinpoint spend. Pinpoint is a subscription recruitment
  platform with sales-led, quote-based pricing rather than a metered,
  pay-per-call API product. The REST API is included with a platform
  subscription and enabled per account; there are no published per-request API
  charges. Cost management therefore centers on the subscription contract,
  module selection (ATS, Onboarding), and seat/usage tiers negotiated with
  sales rather than on token- or call-level metering. Figures are not published
  and are not reconciled in this artifact.
notes: >-
  Subscription pricing is not public; verify packaging, seats, and any API or
  webhook entitlements against a Pinpoint quote during reconciliation.
